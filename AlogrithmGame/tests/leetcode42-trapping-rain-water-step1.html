<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetCode 42 - 接雨水（随机序列准备）</title>
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --text: #111111;
            --muted: #666666;
            --bar: #0074d9;
            --bar-edge: #001f3f;
            --border: #dddddd;
            --focus: #ff851b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
        }

        .card {
            width: min(980px, 94vw);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            background: var(--panel);
        }

        .title {
            margin: 0 0 8px;
            font-size: 26px;
            line-height: 1.2;
        }

        .desc {
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 15px;
        }

        .toolbar {
            margin: 0 0 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--bar-edge);
            background: var(--panel);
            color: var(--bar-edge);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .step-text {
            margin-left: 4px;
            font-size: 14px;
            color: var(--muted);
        }

        .array-text {
            margin: 0 0 14px;
            color: #444444;
            font-size: 14px;
            word-break: break-all;
        }

        .bars-wrap {
            height: 460px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--panel);
            padding: 24px 20px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .bar-item {
            width: clamp(28px, 3.2vw, 36px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .value {
            font-weight: 700;
            font-size: 14px;
            line-height: 1;
        }

        .column {
            position: relative;
            width: 100%;
            height: 340px;
        }

        .bar {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            min-height: 18px;
            border: 2px solid var(--bar-edge);
            border-radius: 0;
            background: var(--bar);
        }

        .bar-item + .bar-item .column {
            margin-left: -2px;
        }

        .bar-item.focus .bar {
            outline: 3px solid var(--focus);
            outline-offset: -3px;
        }

        .bar-item.focus .value,
        .bar-item.focus .index {
            color: var(--focus);
        }

        .index {
            color: #888888;
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1 class="title">LeetCode 42：接雨水</h1>
        <p class="desc">当前先做随机序列与步骤控制，不做填水渲染。后续再接入分步填水。</p>
        <div class="toolbar">
            <button class="btn" id="prevBtn" type="button">上一步</button>
            <button class="btn" id="nextBtn" type="button">下一步</button>
            <button class="btn" id="randomBtn" type="button">随机生成</button>
            <span class="step-text" id="stepText"></span>
        </div>
        <p class="array-text" id="arrayText"></p>

        <section class="bars-wrap" id="barsWrap" aria-label="随机高度柱形图"></section>
    </main>

    <script>
        // 随机数据配置：数量更多，但高度范围不大
        const MIN_LEN = 10;
        const MAX_LEN = 14;
        const MIN_HEIGHT = 2;
        const MAX_HEIGHT = 9;
        const CHART_HEIGHT_PX = 340;

        const wrap = document.getElementById("barsWrap");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const randomBtn = document.getElementById("randomBtn");
        const stepText = document.getElementById("stepText");
        const arrayText = document.getElementById("arrayText");

        let heights = [];
        let currentStep = 0;
        const barItems = [];

        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function createRandomHeights() {
            const length = randInt(MIN_LEN, MAX_LEN);
            const arr = Array.from({ length }, () => randInt(MIN_HEIGHT, MAX_HEIGHT));

            // 两端略高，给后续填水演示留空间
            arr[0] = Math.max(arr[0], 6);
            arr[arr.length - 1] = Math.max(arr[arr.length - 1], 5);
            return arr;
        }

        function getTotalSteps() {
            return Math.max(0, heights.length - 2);
        }

        function getTargetIndex() {
            if (getTotalSteps() === 0) {
                return -1;
            }
            return Math.min(currentStep + 1, heights.length - 2);
        }

        function unitToPx(value, maxHeight) {
            return (value / maxHeight) * CHART_HEIGHT_PX;
        }

        function renderBars() {
            wrap.replaceChildren();
            barItems.length = 0;

            const maxHeight = Math.max(...heights);
            heights.forEach((value, index) => {
                const item = document.createElement("div");
                item.className = "bar-item";

                const label = document.createElement("div");
                label.className = "value";
                label.textContent = String(value);

                const column = document.createElement("div");
                column.className = "column";

                const bar = document.createElement("div");
                bar.className = "bar";
                bar.style.height = `${unitToPx(value, maxHeight)}px`;

                const idx = document.createElement("div");
                idx.className = "index";
                idx.textContent = `i${index}`;

                column.appendChild(bar);
                item.append(label, column, idx);
                wrap.appendChild(item);
                barItems.push(item);
            });
        }

        function updateUI() {
            const total = getTotalSteps();
            const targetIndex = getTargetIndex();

            barItems.forEach((item, index) => {
                item.classList.toggle("focus", index === targetIndex);
            });

            if (total === 0) {
                stepText.textContent = "步骤：0/0";
            } else {
                stepText.textContent = `步骤：${currentStep}/${total}（当前定位索引 ${targetIndex}）`;
            }

            arrayText.textContent = `当前序列（长度 ${heights.length}）：[${heights.join(", ")}]`;

            prevBtn.disabled = currentStep === 0;
            nextBtn.disabled = currentStep === total;
        }

        function regenerate() {
            heights = createRandomHeights();
            currentStep = 0;
            renderBars();
            updateUI();
        }

        prevBtn.addEventListener("click", () => {
            if (currentStep > 0) {
                currentStep -= 1;
                updateUI();
            }
        });

        nextBtn.addEventListener("click", () => {
            const total = getTotalSteps();
            if (currentStep < total) {
                currentStep += 1;
                updateUI();
            }
        });

        randomBtn.addEventListener("click", () => {
            regenerate();
        });

        regenerate();
    </script>
</body>
</html>
