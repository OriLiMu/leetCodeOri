<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetCode 42 - 接雨水（步骤一）</title>
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --text: #111111;
            --muted: #aaaaaa;
            --bar: #0074d9;
            --border: #dddddd;
            --bar-edge: #001f3f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
        }

        .card {
            width: min(900px, 92vw);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            background: var(--panel);
        }

        .title {
            margin: 0 0 8px;
            font-size: 26px;
            line-height: 1.2;
        }

        .desc {
            margin: 0 0 22px;
            color: var(--muted);
            font-size: 15px;
        }

        .bars-wrap {
            height: 460px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--panel);
            padding: 24px 28px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: clamp(20px, 6vw, 60px);
        }

        .bar-item {
            width: clamp(32px, 5vw, 44px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .value {
            font-weight: 700;
            font-size: 16px;
        }

        .bar {
            width: 100%;
            min-height: 20px;
            border: 2px solid var(--bar-edge);
            border-radius: 4px;
            background: var(--bar);
        }

        .index {
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1 class="title">LeetCode 42：接雨水</h1>
        <p class="desc">步骤一：先放入 4 个从大到小的数值，并用 4 个长方形柱子表示。</p>

        <section class="bars-wrap" id="barsWrap" aria-label="高度柱形图"></section>
    </main>

    <script>
        // 第一步固定数据：从大到小
        const heights = [8, 6, 4, 2];
        const maxHeight = Math.max(...heights);
        const wrap = document.getElementById("barsWrap");

        heights.forEach((value, index) => {
            const item = document.createElement("div");
            item.className = "bar-item";

            const label = document.createElement("div");
            label.className = "value";
            label.textContent = String(value);

            const bar = document.createElement("div");
            bar.className = "bar";
            bar.style.height = `${(value / maxHeight) * 340}px`;

            const idx = document.createElement("div");
            idx.className = "index";
            idx.textContent = `索引 ${index}`;

            item.append(label, bar, idx);
            wrap.appendChild(item);
        });
    </script>
</body>
</html>
