<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetCode 42 - 接雨水（步骤一）</title>
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --text: #111111;
            --muted: #aaaaaa;
            --bar: #0074d9;
            --border: #dddddd;
            --bar-edge: #001f3f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
        }

        .card {
            width: min(900px, 92vw);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            background: var(--panel);
        }

        .title {
            margin: 0 0 8px;
            font-size: 26px;
            line-height: 1.2;
        }

        .desc {
            margin: 0 0 22px;
            color: var(--muted);
            font-size: 15px;
        }

        .toolbar {
            margin: 0 0 14px;
            display: flex;
            justify-content: flex-end;
        }

        .btn {
            border: 1px solid var(--bar-edge);
            background: var(--panel);
            color: var(--bar-edge);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .bars-wrap {
            height: 460px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--panel);
            padding: 24px 28px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: clamp(20px, 6vw, 60px);
        }

        .bar-item {
            width: clamp(32px, 5vw, 44px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .value {
            font-weight: 700;
            font-size: 16px;
        }

        .bar {
            width: 100%;
            min-height: 20px;
            border: 2px solid var(--bar-edge);
            border-radius: 4px;
            background: var(--bar);
            transition: height 420ms ease;
        }

        .index {
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1 class="title">LeetCode 42：接雨水</h1>
        <p class="desc">步骤一：先放入 4 个从大到小的数值，再按顺序插入 4 个长方形柱子。</p>
        <div class="toolbar">
            <button class="btn" id="replayBtn" type="button">重播插入</button>
        </div>

        <section class="bars-wrap" id="barsWrap" aria-label="高度柱形图"></section>
    </main>

    <script>
        // 固定四个从大到小的高度数据
        const heights = [8, 6, 4, 2];
        const maxHeight = Math.max(...heights);
        const wrap = document.getElementById("barsWrap");
        const replayBtn = document.getElementById("replayBtn");
        const growDurationMs = 420;
        const gapMs = 160;

        function wait(ms) {
            return new Promise((resolve) => {
                setTimeout(resolve, ms);
            });
        }

        function createBarItem(value, index) {
            const item = document.createElement("div");
            item.className = "bar-item";

            const label = document.createElement("div");
            label.className = "value";
            label.textContent = String(value);

            const bar = document.createElement("div");
            bar.className = "bar";
            bar.style.height = "20px";

            const idx = document.createElement("div");
            idx.className = "index";
            idx.textContent = `索引 ${index}`;

            item.append(label, bar, idx);
            return { item, bar };
        }

        async function playInsertAnimation() {
            replayBtn.disabled = true;
            wrap.replaceChildren();

            for (let i = 0; i < heights.length; i += 1) {
                const value = heights[i];
                const { item, bar } = createBarItem(value, i);
                wrap.appendChild(item);

                const targetHeight = `${(value / maxHeight) * 340}px`;
                requestAnimationFrame(() => {
                    bar.style.height = targetHeight;
                });

                await wait(growDurationMs + gapMs);
            }

            replayBtn.disabled = false;
        }

        replayBtn.addEventListener("click", () => {
            playInsertAnimation();
        });

        playInsertAnimation();
    </script>
</body>
</html>
